[package]
name = "rust-commander"
version = "0.1.0"
edition = "2024"
description = "A clean GTK4 two-pane file commander"
license = "MIT"

[dependencies]
anyhow = "1"
chrono = "0.4"
gio = "0.22.6"
glib = "0.22.7"
gtk = { package = "gtk4", version = "0.11.3", features = ["v4_10"] }
notify = "8"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_Graphics_Gdi", "Win32_Storage_FileSystem", "Win32_UI_Shell", "Win32_UI_WindowsAndMessaging"] }
